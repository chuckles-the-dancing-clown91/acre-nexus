name: Security

# Dependency-advisory gating + SAST (issue #65). Runs on every push/PR and
# weekly so newly-disclosed advisories surface even without a code change.
on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    name: cargo audit (Rust advisories)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # Fails the job on any advisory not explicitly ignored in
      # backend/.cargo/audit.toml (each ignore carries a documented rationale).
      - name: Audit dependencies
        run: cargo audit

  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Audit dependencies (fail on high/critical)
        run: npm audit --audit-level=high

  codeql:
    name: CodeQL (JS/TS SAST)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
