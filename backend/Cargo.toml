[workspace]
resolver = "2"
members = [
    "crates/user",
    "crates/property",
    "crates/client",
    "crates/entity",
    "crates/migration",
    "crates/api",
]

# Shared dependency versions for the whole workspace. Pinned to recent
# major versions so the stack compiles reproducibly on Rust 2021/1.94+.
[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Proprietary"
authors = ["Acre Platform"]

[workspace.dependencies]
sea-orm = { version = "1.1", features = [
    "sqlx-postgres",
    "runtime-tokio-rustls",
    "macros",
    "with-chrono",
    "with-uuid",
    "with-json",
] }
sea-orm-migration = { version = "1.1", features = [
    "sqlx-postgres",
    "runtime-tokio-rustls",
] }
rocket = { version = "0.5", features = ["json"] }
# Auto-generated OpenAPI docs from the Rocket routes + Swagger UI / RapiDoc.
rocket_okapi = { version = "0.9", features = ["swagger", "rapidoc"] }
schemars = { version = "0.8", features = ["chrono", "uuid1"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "v7", "serde"] }
jsonwebtoken = "9"
argon2 = "0.5"
rand = "0.8"
sha2 = "0.10"
# Field-level PII encryption at rest (SSN / government IDs).
aes-gcm = "0.10"
base64 = "0.22"
thiserror = "1"
anyhow = "1"
dotenvy = "0.15"
# HTTP client for live enrichment providers (e.g. the US Census geocoder).
# rustls only — no OpenSSL — and honours HTTPS_PROXY from the environment.
reqwest = { version = "0.12", default-features = false, features = [
    "json",
    "rustls-tls",
    "rustls-tls-native-roots",
] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
# Multi-provider object storage for uploaded documents/logos: one API over the
# local filesystem, AWS S3 (+ S3-compatible), and Google Cloud Storage. Lets a
# tenant use platform-managed storage or bring their own bucket.
object_store = { version = "0.11", features = ["aws", "gcp"] }
bytes = "1"
futures = "0.3"
# Document templating + real document generation + email delivery.
handlebars = "6"
printpdf = { version = "0.7", features = ["embedded_images"] }
image = { version = "0.24", default-features = false, features = ["png", "jpeg"] }
lettre = { version = "0.11", default-features = false, features = [
    "builder",
    "smtp-transport",
    "tokio1-rustls-tls",
] }

# Faster, smaller release builds.
[profile.release]
lto = "thin"
codegen-units = 1
