[workspace]
resolver = "2"
members = ["crates/entity", "crates/migration", "crates/api"]

# Shared dependency versions for the whole workspace. Pinned to recent
# major versions so the stack compiles reproducibly on Rust 2021/1.94+.
[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Proprietary"
authors = ["Acre Platform"]

[workspace.dependencies]
sea-orm = { version = "1.1", features = [
    "sqlx-postgres",
    "runtime-tokio-rustls",
    "macros",
    "with-chrono",
    "with-uuid",
    "with-json",
] }
sea-orm-migration = { version = "1.1", features = [
    "sqlx-postgres",
    "runtime-tokio-rustls",
] }
rocket = { version = "0.5", features = ["json"] }
# Auto-generated OpenAPI docs from the Rocket routes + Swagger UI / RapiDoc.
rocket_okapi = { version = "0.9", features = ["swagger", "rapidoc"] }
schemars = { version = "0.8", features = ["chrono", "uuid1"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
jsonwebtoken = "9"
argon2 = "0.5"
rand = "0.9"
sha2 = "0.10"
# HMAC-SHA1 for RFC 6238 TOTP (authenticator-app MFA); SHA-1 is used *only*
# for the standard TOTP construction, never for security hashing.
sha1 = "0.10"
# Constant-time HMAC-SHA256 for webhook signature verification + signed URLs.
hmac = "0.12"
# HKDF-SHA256 + P-256 ECDH/ECDSA for Web Push (RFC 8291 payload encryption +
# RFC 8292 VAPID) — RustCrypto, no SDK.
hkdf = "0.12"
p256 = { version = "0.13", features = ["ecdh", "ecdsa"] }
# Field-level PII encryption at rest (SSN / government IDs).
aes-gcm = "0.10"
base64 = "0.22"
thiserror = "1"
anyhow = "1"
dotenvy = "0.15"
# HTTP client for live enrichment providers (e.g. the US Census geocoder).
# rustls only — no OpenSSL — and honours HTTPS_PROXY from the environment.
reqwest = { version = "0.12", default-features = false, features = [
    "json",
    "rustls-tls",
    "rustls-tls-native-roots",
] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Faster, smaller release builds.
[profile.release]
lto = "thin"
codegen-units = 1
